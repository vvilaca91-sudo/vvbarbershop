<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin</title>
  <link rel="stylesheet" href="styles/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
  <header>
    <nav class="nav">
      <img src="imagens/logo.png" class="logo" alt="Logo">
    </nav>
  </header>

  <h2>Login Admin</h2>

  <section class="marcacao">
    <form id="loginForm" class="formulario">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Email" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Entrar</button>
    </form>
    <a href="index.html" class="voltar-btn">Voltar</a>

    <p id="loginErro" style="color:#ff6b6b; margin-top: 12px;"></p>
  </section>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://kispxcgpyujynhzcacfg.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtpc3B4Y2dweXVqeW5oemNhY2ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzEzNzQsImV4cCI6MjA5MDQ0NzM3NH0.gq5yIzYwQFtmnVS5V_2Jayfe4l1v_ngCxBfbJzyUikU"
    );

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const erroEl = document.getElementById("loginErro");

      erroEl.textContent = "";

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        console.log(error);
        erroEl.textContent = "Email ou password inválidos.";
        return;
      }

      window.location.href = "admin.html";
    });
  </script>
</body>
</html>
