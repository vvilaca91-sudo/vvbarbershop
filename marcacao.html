<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcação - BarberShop</title>
    <link rel="stylesheet" href="styles/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
<header>
    <nav class="nav">
        <img src="imagens/logo.png" class="logo">
    </nav>    
</header> 
<h2>Marque a sua visita</h2>
<section class="marcacao">
    <form id="formMarcacao" class="formulario">
      
        <label for="nome">Nome</label>
        <input type="text" name="Nome" id="nome" placeholder="Nome" required>
        <label for="telefone">Telemóvel</label>
        <input type="tel" name="telefone" id="telefone" placeholder="Telemóvel" required>
        <label for="data">Data</label>
        <input type="date" name="data" placeholder="Data" id="data" required>
        <script>
            const hoje = new Date().toISOString().split("T")[0];
            document.getElementById("data").setAttribute("min", hoje);
        </script>
        <script>
            document.getElementById("data").addEventListener("input", function() {
                const dataEscolhida = new Date(this.value);
                const diaSemana = dataEscolhida.getDay();
                if (diaSemana === 0) {
                    alert("Domingo estamos encerrados!");
                    this.value = "";
                }
            });    
        </script>
        <label for="hora">Hora</label>
        <select name="hora" id="hora" required>
            <option value="">Escolha a hora</option>
            <option>09:00</option>
            <option>10:00</option>
            <option>11:00</option>
            <option>12:00</option>
            <option>14:00</option>
            <option>15:00</option>
            <option>16:00</option>
            <option>17:00</option>
            <option>18:00</option>
            <option>19:00</option>
        </select>
        
        <label for="hora">Hora</label>
        <select name="servico" id="servico" required>
            <option value="">Escolha o seu serviço</option>
            <option>Corte clássico</option>
            <option>Barba</option>
            <option>Cabelo + Barba</option>
            <option>Premium/expresso</option>
        </select>


        <input type="hidden" name="_subject" value="Nova marcação BarberShop">
        
        <button type="submit">Comfirmar Marcação</button>    
    </form>
    <a  href="index.html" class="marqueja">Voltar</a>       
</section>

<script>
document.getElementById("formMarcacao").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nome = document.getElementById("nome").value;
    const telefone = document.getElementById("telefone").value;
    const data = document.getElementById("data").value;
    const hora = document.getElementById("hora").value;
    const servico = document.getElementById("servico").value;

    const { data: resultado, error } = await supabaseClient
        .from("marcacoes")
        .insert([
            { nome, telefone, data, hora, servico }
        ]);

    if (error) {
        alert("Erro ao marcar 😢");
        console.log(error);
    } else {
        window.location.href = "confirmacao.html";
    }
});
</script>

<script>
const todasHoras = [
  "09:00","10:00","11:00","12:00",
  "14:00","15:00","16:00","17:00",
  "18:00","19:00"
];

document.getElementById("data").addEventListener("input", async function () {
  const dataSelecionada = this.value;

  const { data, error } = await supabaseClient
    .from("marcacoes")
    .select("hora")
    .eq("data", dataSelecionada);

  if (error) {
    console.log("Erro ao buscar horários:", error);
    return;
  }

  console.log("Dados do Supabase:", data);

  const horasOcupadas = data.map(item => item.hora.slice(0,5));
  console.log("Horas ocupadas:", horasOcupadas);

  const selectHora = document.getElementById("hora");

  selectHora.innerHTML = '<option value="">Escolha a hora</option>';

  todasHoras.forEach(hora => {
    console.log("A testar hora:", hora);

    if (!horasOcupadas.includes(hora)) {
      const option = document.createElement("option");
      option.value = hora;
      option.textContent = hora;
      selectHora.appendChild(option);
    }
  });

  if (todasHoras.length === horasOcupadas.length) {
    const option = document.createElement("option");
    option.textContent = "Sem horários disponíveis";
    option.disabled = true;
    selectHora.appendChild(option);
  }
});
</script>
